schema_version: 1
obligations:
  - id: "P-01"
    statement: "Identify Wplus_12 in a closure-compatible operator class."
    depends_on: []
    sources:
      - "Karlovich2025Cusps:3.3"
      - "KKL2014TwoShifts:4.4"
    factors_affected:
      - "Wplus_12"
    status: "BLOCKED"
    evidence_required: "kernel or symbol comparison including cutoff, weight, and branches"
    blocking_effect: "blocks H2, H3, Mellin closure, and cusp-algebra membership"
    closure_criterion: "an exact or certified mod-compact class identification"
  - id: "P-02"
    statement: "Represent U1 and prove the exact ordered factorized composition R1 U1."
    depends_on: []
    sources:
      - "paper:mellin-representation-dilation-shift"
      - "phase-q:exact-right-dilation-definition-proof"
    factors_affected:
      - "R1"
      - "U1"
    status: "ANALYTICALLY_PROVED"
    evidence_required: "direct dense-core derivation plus bounded extension"
    blocking_effect: "removes the composition-formula blocker, not standard-class membership"
    closure_criterion: "retain the exact ordered pair (r1,d_gamma1) without an E-tilde claim"
  - id: "P-03"
    statement: "Represent Ghat1 and certify the ordered R1 Ghat1 semiproduct."
    depends_on: []
    sources:
      - "paper:normalized-diagonal-symbol-admissible"
      - "KKL2014TwoShifts:3.3"
    factors_affected:
      - "R1"
      - "Ghat1"
    status: "ANALYTICALLY_PROVED"
    evidence_required: "paper membership proof plus every hypothesis of Theorem 3.3"
    blocking_effect: "discharges the coefficient case only, modulo compact operators"
    closure_criterion: "Op(r1)M_Ghat1 is Op(r1 Ghat1) modulo compact operators"
  - id: "P-04"
    statement: "Control the R1 U1 and R1 Ghat1 cases separately at their proved strengths."
    depends_on:
      - "P-02"
      - "P-03"
    sources:
      - "KKL2014TwoShifts:3.3"
      - "KKL2014TwoShifts:3.4"
    factors_affected:
      - "R1"
      - "U1"
      - "Ghat1"
    status: "ANALYTICALLY_PROVED"
    evidence_required: "exact right-factorized dilation case and mod-compact coefficient case"
    blocking_effect: "discharges both short cores without asserting a common algebra"
    closure_criterion: "retain the two relations and their distinct output classes"
  - id: "P-05"
    statement: "Control (R1 B1)Wplus_12 without reordering factors."
    depends_on:
      - "P-01"
      - "P-04"
    sources:
