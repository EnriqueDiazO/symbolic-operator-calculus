    evidence_required: "four ordered prefix derivations and compact-ideal stability"
    blocking_effect: "leaves only right composition with Wplus_12 common to the four words"
    closure_criterion: "two standard and two right-factorized Mellin PDOs modulo compacts"
  - id: "P-07"
    statement: "Prove compactness of every accumulated residue."
