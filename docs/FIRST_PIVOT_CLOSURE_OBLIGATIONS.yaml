    status: "BLOCKED"
    evidence_required: "compatible representation of Wplus_12 and a lateral product theorem"
    blocking_effect: "blocks H2 and H3"
    closure_criterion: "derive a certified model for the ordered three-factor suffix"
  - id: "P-06"
    statement: "Control Q1 before each R1 B1 core, stopping before Wplus_12."
